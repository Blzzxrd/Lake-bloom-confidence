services:
  api:
    build: .
    environment:
      LBC_DATABASE_URL: postgresql+psycopg://lakebloom:lakebloom@db:5432/lakebloom
      LBC_SEED_DEMO_DATA: "true"
      LBC_SCHEDULER_ENABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: lakebloom
      POSTGRES_USER: lakebloom
      POSTGRES_PASSWORD: lakebloom
    ports:
      - "5432:5432"
    volumes:
      - lakebloom_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakebloom -d lakebloom"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  lakebloom_data:
